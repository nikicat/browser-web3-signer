<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 412" width="700" height="412" role="img" aria-labelledby="t">
  <title id="t">How browser-web3-signer works, top to bottom: CLI or library call, local HTTP bridge (127.0.0.1 only), approval page in a browser tab, your web3 wallet; a return ladder on the right carries the signed approval back to the page, the completion POST to the bridge, and the final result to the caller.</title>
  <defs>
    <marker id="ai" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#8b7cf6"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#8b949e"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#3fb950"/></marker>
  </defs>

  <rect x="1" y="1" width="698" height="410" rx="12" fill="#0d1117" stroke="#30363d"/>

  <g font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
    <rect x="140" y="36" width="280" height="56" rx="8" fill="#161b22" stroke="#3d444d" stroke-width="1.25"/>
    <text x="280" y="69" text-anchor="middle" font-size="15" font-weight="600" fill="#e6edf3">CLI <tspan fill="#9198a1" font-weight="400">or</tspan> Library</text>

    <rect x="140" y="130" width="280" height="56" rx="8" fill="#161b22" stroke="#8b7cf6" stroke-width="1.25"/>
    <text x="280" y="154" text-anchor="middle" font-size="15" font-weight="600" fill="#e6edf3">HTTP Bridge</text>
    <text x="280" y="173" text-anchor="middle" font-size="12" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" fill="#9198a1">127.0.0.1 only</text>

    <rect x="140" y="224" width="280" height="56" rx="8" fill="#161b22" stroke="#3d444d" stroke-width="1.25"/>
    <text x="280" y="248" text-anchor="middle" font-size="15" font-weight="600" fill="#e6edf3">Browser</text>
    <text x="280" y="267" text-anchor="middle" font-size="12.5" fill="#9198a1">approval page</text>

    <rect x="140" y="318" width="280" height="56" rx="8" fill="#161b22" stroke="#e3b341" stroke-width="1.25"/>
    <text x="280" y="342" text-anchor="middle" font-size="15" font-weight="600" fill="#e6edf3">Web3 Wallet</text>
    <text x="280" y="361" text-anchor="middle" font-size="12.5" fill="#9198a1">MetaMask / Rabby / TronLink</text>

    <text x="280" y="398" text-anchor="middle" font-size="12.5" font-style="italic" fill="#e3b341">you approve</text>
  </g>

  <line x1="280" y1="94" x2="280" y2="124" stroke="#8b7cf6" stroke-width="1.75" marker-end="url(#ai)"/>
  <line x1="280" y1="188" x2="280" y2="218" stroke="#8b7cf6" stroke-width="1.75" marker-end="url(#ai)"/>
  <line x1="280" y1="282" x2="280" y2="312" stroke="#8b7cf6" stroke-width="1.75" marker-end="url(#ai)"/>

  <!-- signed: wallet → approval page -->
  <path d="M 424 346 L 470 346 L 470 258 L 428 258" fill="none" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ar)"/>
  <!-- completion: approval page → bridge -->
  <path d="M 424 246 L 470 246 L 470 166 L 428 166" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#ag)"/>
  <!-- result: bridge → caller -->
  <path d="M 424 152 L 470 152 L 470 72 L 428 72" fill="none" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ar)"/>

  <g font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12">
    <text x="482" y="306" fill="#7ee787">signed</text>
    <text x="482" y="210" fill="#8b949e">POST /api/complete/{id}</text>
    <text x="482" y="116" fill="#7ee787">result</text>
  </g>
</svg>
