# Release pipeline: merging a version-bump PR to master IS the release.
#
# Trigger: a push to master that touches Cargo.toml. Preflight reads the
# [workspace.package] version; if the vX.Y.Z tag already exists (a Cargo.toml
# change without a bump — dep updates etc.) everything is skipped. Otherwise, in order:
#   preflight  assert version lockstep (Cargo.toml, internal dep pins, ts/package.json)
#   build      cargo build --release for 5 targets (all native runners, static musl on linux)
#   release    create the vX.Y.Z GitHub release on the merge commit (this creates the tag)
#              with raw per-target binaries + SHA256SUMS, and push the go/vX.Y.Z tag that
#              versions the Go module in go/ (subdirectory modules need their own prefixed tag)
#   npm        publish 5 @nikicat/browser-web3-signer-<platform> packages carrying the
#              binaries, then the main browser-web3-signer package with them injected as
#              exact-pinned optionalDependencies (scripts/npm-platform.mjs; the esbuild
#              pattern — nothing is ever committed by this pipeline)
#   crates     publish the 4 workspace crates to crates.io in dependency order
#   verify     on every runner OS: `npm install browser-web3-signer@<version>` from the
#              real registry into a scratch dir and spawn `serve` through it — proves the
#              platform-package resolution and the published binary actually work
#
# Versioning is lockstep: the npm packages, the crates, the Rust binary, and the tag share
# one version. Cutting a release = `just release [major|minor|patch|X.Y.Z]`
# (scripts/release.sh): it opens a PR bumping the versions; CI validates it; merging it
# triggers this workflow. Everything lives in one workflow because tags created with the
# default GITHUB_TOKEN deliberately do not trigger other workflows (GitHub's recursion
# guard). Re-running a partially failed run is safe: the release upload uses --clobber and
# npm/crates publishes are skipped when the version already exists.
#
# Rehearsal: run via workflow_dispatch with dry_run=true — builds everything and dry-runs
# the npm and crates.io publishes, but creates no release/tags and publishes nothing.
#
# npm auth — trusted publishing (OIDC), no tokens anywhere:
#   On npmjs.com, configure this repo + release.yml as a trusted publisher for
#   browser-web3-signer and each @nikicat/browser-web3-signer-<platform> package. The
#   workflow then authenticates via the id-token permission and npm generates provenance
#   attestations automatically. Requires npm >= 11.5.1 (upgraded in the job).
#
#   One-time bootstrap: a trusted publisher can only be configured on an EXISTING
#   package, so the very first publish of the 6 packages happens locally with your own
#   npm login, from binaries built by a dry-run of this workflow:
#     gh workflow run release.yml -f tag=v0.1.0 -f dry_run=true   # wait for it
#     gh run download <run-id> -p 'bin-*' -D dist && mv dist/bin-*/* dist/
#     node scripts/npm-platform.mjs gen 0.1.0 dist pkgs
#     for d in pkgs/*/; do npm publish --access public "$d"; done
#     cd ts && npm ci && node ../scripts/npm-platform.mjs inject 0.1.0 package.json \
#       && npm publish --access public && git checkout package.json
#   Then configure the trusted publishers on npmjs.com; every later release is pure CI.
#
# crates.io auth — same trusted-publishing story (rust-lang/crates-io-auth-action
# exchanges the job's OIDC token for a temporary registry token). Same bootstrap: the
# first publish of the 4 crates happens locally (`cargo publish --workspace`), then
# configure this repo + release.yml as a trusted publisher for each crate on crates.io.
# The crates job checks the index before authenticating, so runs where every crate is
# already published (including the bootstrap release) skip auth entirely.

name: Release

on:
  push:
    branches: [master]
    paths: [Cargo.toml]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to simulate (e.g. v0.1.0)'
        required: true
      dry_run:
        description: 'Build and dry-run the publishes; skip release creation and publishing'
        type: boolean
        default: true

# One release at a time; a queued newer bump waits for the current one.
concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: preflight (version lockstep + release decision)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      publish: ${{ steps.version.outputs.publish }}
      dry_run: ${{ steps.version.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v7

      - name: Determine and cross-check the version
        id: version
        run: |
          CARGO_VERSION=$(sed -n '/^\[workspace\.package\]/,/^\[/p' Cargo.toml \
            | sed -n 's/^version = "\(.*\)"/\1/p' | head -n1)
          if [ "$GITHUB_EVENT_NAME" = 'workflow_dispatch' ]; then
            TAG='${{ inputs.tag }}'
          else
            TAG="v$CARGO_VERSION"
          fi
          VERSION="${TAG#v}"
          TS_VERSION=$(jq -r .version ts/package.json)
          echo "tag=$TAG cargo=$CARGO_VERSION ts=$TS_VERSION"
          [ "$CARGO_VERSION" = "$VERSION" ] || { echo "::error::Cargo.toml [workspace.package] version $CARGO_VERSION != tag $TAG"; exit 1; }
          [ "$TS_VERSION" = "$VERSION" ] || { echo "::error::ts/package.json version $TS_VERSION != tag $TAG"; exit 1; }
          # The internal path deps carry the version published crates depend on;
          # release.sh bumps them in lockstep, so a mismatch means a hand-edited bump.
          if grep -E 'browser-web3-signer-(core|evm|tron) = \{ path' Cargo.toml | grep -vq "version = \"$VERSION\""; then
            echo "::error::internal dep pins in [workspace.dependencies] are not at $VERSION"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dry_run=${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          if [ "$GITHUB_EVENT_NAME" = 'workflow_dispatch' ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          elif git ls-remote --exit-code --tags origin "refs/tags/$TAG" > /dev/null 2>&1; then
            echo "$TAG already exists — Cargo.toml change without a version bump, nothing to release"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: build (${{ matrix.target }})
    needs: preflight
    if: needs.preflight.outputs.publish == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
            exe: ''
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            exe: ''
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            exe: ''
          - target: aarch64-apple-darwin
            runner: macos-14
            exe: ''
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            exe: '.exe'
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      # musl-gcc, needed by ring's C sources on the static musl targets.
      - name: Install musl-tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry and target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-release-

      - name: Build
        shell: bash
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --release --locked --bin browser-web3-signer --target ${{ matrix.target }}

      # All runners are native for their target, so the binary is directly executable.
      - name: Smoke-check the binary version
        shell: bash
        run: |
          BIN='target/${{ matrix.target }}/release/browser-web3-signer${{ matrix.exe }}'
          OUT="$("$BIN" --version)"
          echo "$OUT"
          case "$OUT" in *'${{ needs.preflight.outputs.version }}'*) ;; *)
            echo "::error::binary reports \"$OUT\", expected ${{ needs.preflight.outputs.version }}"; exit 1;;
          esac

      - name: Stage release asset
        shell: bash
        run: |
          mkdir staged
          cp 'target/${{ matrix.target }}/release/browser-web3-signer${{ matrix.exe }}' \
             'staged/browser-web3-signer-${{ matrix.target }}${{ matrix.exe }}'

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: staged/*
          if-no-files-found: error

  release:
    name: github release + tags
    needs: [preflight, build]
    if: needs.preflight.outputs.publish == 'true' && needs.preflight.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: v${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: dist
          merge-multiple: true

      - name: Checksums
        run: cd dist && sha256sum browser-web3-signer-* > SHA256SUMS

      # Creating the release creates the vX.Y.Z tag on the merge commit.
      - name: Create or update the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" dist/* --target "$GITHUB_SHA" --title "$TAG" \
              --generate-notes --repo "$GITHUB_REPOSITORY"
          fi

      - name: Push the Go module tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/go/$TAG" > /dev/null 2>&1; then
            echo "go/$TAG already exists, skipping"
          else
            git tag "go/$TAG" "$GITHUB_SHA"
            git push origin "go/$TAG"
          fi

  npm:
    name: npm publish
    needs: [preflight, build]
    if: needs.preflight.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      DRY_RUN: ${{ needs.preflight.outputs.dry_run }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: dist
          merge-multiple: true

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Trusted publishing needs npm >= 11.5.1; upgrade regardless of what node bundles.
      # Pinned to the 11.x line: npm@12.0.0 ships a broken global install (missing
      # `sigstore` module → provenance generation dies with MODULE_NOT_FOUND).
      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@11
          npm --version

      - name: Generate platform packages
        run: node scripts/npm-platform.mjs gen "$VERSION" dist pkgs

      # Platform packages go first so the main package's exact pins always resolve.
      - name: Publish platform packages
        run: |
          for dir in pkgs/*/; do
            NAME=$(jq -r .name "$dir/package.json")
            if [ "$DRY_RUN" = 'true' ]; then
              npm publish --dry-run --access public "$dir"
            elif npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
              echo "$NAME@$VERSION already published, skipping"
            else
              npm publish --access public "$dir"
            fi
          done

      - name: Publish the main package
        working-directory: ts
        run: |
          npm ci
          # Inject after `npm ci` (it would reject a package.json/lockfile mismatch) and
          # never commit: the platform packages exist on npm, not in the repo.
          node ../scripts/npm-platform.mjs inject "$VERSION" package.json
          if [ "$DRY_RUN" = 'true' ]; then
            npm publish --dry-run --access public
          elif npm view "browser-web3-signer@$VERSION" version > /dev/null 2>&1; then
            echo "browser-web3-signer@$VERSION already published, skipping"
          else
            npm publish --access public
          fi

  crates:
    name: crates.io publish
    needs: [preflight, build]
    if: needs.preflight.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # crates.io trusted publishing
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Cache cargo registry and target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: crates-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: crates-publish-

      - name: Dry-run publish
        if: needs.preflight.outputs.dry_run == 'true'
        run: cargo publish --workspace --locked --dry-run

      # Check the sparse index before authenticating: re-runs and the trusted-publishing
      # bootstrap release (published locally) skip auth entirely.
      - name: Determine which crates need publishing
        if: needs.preflight.outputs.dry_run != 'true'
        id: todo
        run: |
          todo=""
          for crate in browser-web3-signer-core browser-web3-signer-evm browser-web3-signer-tron browser-web3-signer; do
            prefix="${crate:0:2}/${crate:2:2}"
            if curl -sSf "https://index.crates.io/$prefix/$crate" 2> /dev/null | grep -q "\"vers\":\"$VERSION\""; then
              echo "$crate@$VERSION already published, skipping"
            else
              todo="$todo $crate"
            fi
          done
          echo "todo:$todo"
          echo "crates=${todo# }" >> "$GITHUB_OUTPUT"

      - name: Authenticate with crates.io (OIDC)
        if: needs.preflight.outputs.dry_run != 'true' && steps.todo.outputs.crates != ''
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      # Dependency order (core -> evm/tron -> cli); cargo waits for each published
      # crate to appear in the index before the next publish resolves it.
      - name: Publish
        if: needs.preflight.outputs.dry_run != 'true' && steps.todo.outputs.crates != ''
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          for crate in ${{ steps.todo.outputs.crates }}; do
            cargo publish -p "$crate" --locked
          done

  verify:
    name: verify install (${{ matrix.runner }})
    needs: [preflight, npm]
    if: needs.preflight.outputs.dry_run != 'true'
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15-intel
          - macos-14
          - windows-latest
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # No repo checkout: the scratch project sees only what a real user gets from npm.
      - name: Install from the registry (with propagation retries)
        shell: bash
        run: |
          mkdir scratch && cd scratch
          npm init -y > /dev/null
          npm pkg set type=module
          for i in $(seq 1 20); do
            npm install --no-audit --no-fund "browser-web3-signer@$VERSION" && exit 0
            echo "not yet available, retry $i/20"; sleep 15
          done
          echo "::error::browser-web3-signer@$VERSION not installable after 5 minutes"; exit 1

      - name: Spawn serve through the installed package
        shell: bash
        working-directory: scratch
        run: |
          cat > smoke.js <<'EOF'
          import { ServeProcess } from "browser-web3-signer";
          const p = new ServeProcess("evm", { browser: "print" });
          const baseUrl = await p.start();
          const health = await (await fetch(`${baseUrl}/api/v1/health`)).json();
          await p.stop();
          if (health.status !== "ok") {
            console.error("health check failed:", health);
            process.exit(1);
          }
          console.log(`OK on ${process.platform}-${process.arch}: installed, spawned, health=${health.status}`);
          EOF
          node smoke.js
