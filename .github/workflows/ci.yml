name: CI

on:
  push:
    branches: ['**']
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  ci:
    name: fmt + taplo + clippy + build + test
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git pkgconf rustup taplo-cli
          # rust-toolchain.toml drives channel + components on first cargo call.

      - uses: actions/checkout@v6

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: taplo fmt
        run: taplo fmt --check

      - name: taplo lint
        run: taplo lint

      - name: clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: build
        run: cargo build --all-targets --locked

      - name: test
        run: cargo test --all-features --locked

  e2e:
    name: e2e (Playwright mock-wallet → Rust bridge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-e2e-

      - name: Build e2e harness
        run: cargo build --bin e2e-harness --features e2e --locked

      - name: Install Node deps + Chromium
        working-directory: tests/e2e-browser
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: tests/e2e-browser
        run: npm test

  coverage:
    name: coverage (cargo-llvm-cov → Codecov)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git pkgconf rustup cargo-llvm-cov

      - uses: actions/checkout@v6

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-coverage-

      - name: Generate lcov coverage
        run: |
          cargo llvm-cov --all-features --locked --lcov --output-path lcov.info \
            --ignore-filename-regex '(crates/browser-web3-signer/src/(main|output|flow)\.rs)'

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: false
          # Set a CODECOV_TOKEN repo secret for protected-branch uploads.
          token: ${{ secrets.CODECOV_TOKEN }}
