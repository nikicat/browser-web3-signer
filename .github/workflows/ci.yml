name: CI

on:
  push:
    branches: ['**']
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  ci:
    name: fmt + taplo + clippy + build + test
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git pkgconf rustup taplo-cli
          # rust-toolchain.toml drives channel + components on first cargo call.

      - uses: actions/checkout@v7

      - name: Cache cargo registry and target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: taplo fmt
        run: taplo fmt --check

      - name: taplo lint
        run: taplo lint

      - name: clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: build
        run: cargo build --all-targets --locked

      - name: test
        run: cargo test --all-features --locked

  e2e:
    name: e2e (Playwright mock-wallet → Rust bridge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Cache cargo registry and target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-e2e-

      - name: Build e2e harnesses
        run: cargo build --bin evm-harness --bin tron-harness --features e2e --locked

      - name: Install Node deps + Chromium
        working-directory: tests/e2e-browser
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: tests/e2e-browser
        run: npm test

  ts-binding:
    name: ts-binding (viem over the serve subprocess)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Cache cargo registry and target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-ts-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-ts-

      - name: Build the signer binary
        run: cargo build --bin browser-web3-signer --locked

      - name: Install Node deps
        working-directory: ts
        run: npm install

      - name: Typecheck
        working-directory: ts
        run: npm run typecheck

      - name: Test (against the real serve subprocess)
        working-directory: ts
        run: npm test

  go-binding:
    name: go-binding (Go client over the serve subprocess)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Cache cargo registry and target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-go-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Build the signer binary
        run: cargo build --bin browser-web3-signer --locked

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: gofmt
        working-directory: go
        run: test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }

      - name: Vet
        working-directory: go
        run: go vet ./...

      - name: Test (against the real serve subprocess)
        working-directory: go
        run: go test ./...

  coverage:
    name: coverage (cargo-llvm-cov → Codecov)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git pkgconf rustup cargo-llvm-cov

      - uses: actions/checkout@v7

      - name: Cache cargo registry and target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-coverage-

      - name: Generate lcov coverage
        run: |
          cargo llvm-cov --all-features --locked --lcov --output-path lcov.info \
            --ignore-filename-regex '(crates/browser-web3-signer/src/(main|output|flow)\.rs)'

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
          # Set a CODECOV_TOKEN repo secret for protected-branch uploads.
          token: ${{ secrets.CODECOV_TOKEN }}
